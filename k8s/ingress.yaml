apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biblio-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: biblio.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: biblio-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: biblio-frontend
            port:
              number: 80
