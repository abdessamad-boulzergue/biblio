<mat-card class="form-container">
  <mat-card-header>
    <mat-card-title>{{ editMode ? 'Modifier l\'Article' : 'Créer un Article' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="article-form">
      
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Titre</mat-label>
          <input matInput formControlName="title" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>SKU (Référence)</mat-label>
          <input matInput formControlName="sku" required>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Prix HT</mat-label>
          <input matInput type="number" formControlName="priceHT" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>TVA (%)</mat-label>
          <input matInput type="number" formControlName="taxRate" required>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Stock</mat-label>
          <input matInput type="number" formControlName="stockQuantity" required>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description Courte</mat-label>
          <textarea matInput formControlName="shortDescription" rows="2"></textarea>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description Longue</mat-label>
          <textarea matInput formControlName="longDescription" rows="4"></textarea>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Poids (kg)</mat-label>
          <input matInput type="number" formControlName="weight">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Dimensions (L x l x H)</mat-label>
          <input matInput formControlName="dimensions">
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Catégorie</mat-label>
          <mat-select formControlName="category">
            <mat-option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Statut</mat-label>
          <mat-select formControlName="status" required>
            <mat-option *ngFor="let st of statuses" [value]="st">{{st}}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="upload-section">
        <h3>Image Principale</h3>
        <input type="file" (change)="onMainImageSelected($event)" accept="image/*">
        <div *ngIf="mainImageUrl" class="image-preview">
          <img [src]="mainImageUrl" alt="Preview" width="150">
        </div>
      </div>

      <div class="upload-section">
        <h3>Galerie d'images (Optionnel)</h3>
        <input type="file" (change)="onGalleryImagesSelected($event)" accept="image/*" multiple>
        <div class="gallery-preview">
          <div *ngFor="let url of galleryUrls; let i = index" class="gallery-item">
            <img [src]="url" alt="Gallery Preview" width="100">
            <button mat-icon-button color="warn" type="button" (click)="removeGalleryImage(i)">
              <mat-icon>cancel</mat-icon>
            </button>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/admin/articles">Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="articleForm.invalid">Enregistrer</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
