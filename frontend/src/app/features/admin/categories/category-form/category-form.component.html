<mat-card class="form-container">
  <mat-card-header>
    <mat-card-title>{{ editMode ? 'Modifier la Catégorie' : 'Créer une Catégorie' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="category-form">
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nom de la catégorie</mat-label>
        <input matInput formControlName="name" required>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="3"></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Catégorie Parente (Optionnel)</mat-label>
        <mat-select formControlName="parentCategory">
          <mat-option [value]="null">-- Aucune --</mat-option>
          <mat-option *ngFor="let cat of parentCategories" [value]="cat.id">{{cat.name}}</mat-option>
        </mat-select>
      </mat-form-field>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/admin/categories">Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="categoryForm.invalid">Enregistrer</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
