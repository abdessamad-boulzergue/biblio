<div class="orders-container">
  <h1>Mes Commandes</h1>
  
  <mat-card *ngIf="orders.length === 0" class="empty-state">
    <mat-icon class="empty-icon">inbox</mat-icon>
    <mat-card-content>
      Vous n'avez passé aucune commande pour le moment.
    </mat-card-content>
  </mat-card>

  <table mat-table [dataSource]="orders" class="mat-elevation-z2" *ngIf="orders.length > 0">
    
    <ng-container matColumnDef="orderNumber">
      <th mat-header-cell *matHeaderCellDef> N° Commande </th>
      <td mat-cell *matCellDef="let order" class="bold"> {{ order.orderNumber }} </td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Date </th>
      <td mat-cell *matCellDef="let order"> {{ order.createdAt | date:'shortDate' }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Statut </th>
      <td mat-cell *matCellDef="let order"> 
        <mat-chip [style.backgroundColor]="getStatusColor(order.status)" style="color: white;" selected>{{ order.status }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef> Total TTC </th>
      <td mat-cell *matCellDef="let order" class="bold"> {{ order.totalAmountTTC | number:'1.2-2' }} € </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let order"> 
        <button mat-icon-button color="primary" title="Voir les détails">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="warn" title="Demander un retour" 
                *ngIf="order.status === 'LIVREE'" 
                (click)="requestReturn(order.id)">
          <mat-icon>assignment_return</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
