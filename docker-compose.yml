version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: biblio_postgres
    environment:
      POSTGRES_DB: biblio_db
      POSTGRES_USER: biblio_user
      POSTGRES_PASSWORD: biblio_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - biblio_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: biblio_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biblio.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - biblio_network

volumes:
  postgres_data:

networks:
  biblio_network:
    driver: bridge
